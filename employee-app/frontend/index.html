<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vegavruddhi – Employee Portal</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="logo-full.png" alt="Vegavruddhi Pvt. Ltd." />
        <span class="tagline">IT &amp; Business Consultation Services</span>
      </div>
      <hr class="auth-divider" />

      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your employee account</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@vegavruddhi.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-link">
        New joiner? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginBtn');
      errorMsg.style.display = 'none';
      loginBtn.textContent = 'Signing in...';
      loginBtn.disabled = true;

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.message || 'Login failed';
          errorMsg.style.display = 'block';
          // Special styling for pending approval
          if (res.status === 403) {
            errorMsg.style.borderLeftColor = data.message.includes('pending') ? '#f57f17' : '#c62828';
            errorMsg.style.background      = data.message.includes('pending') ? '#fff8e1' : '#fdecea';
            errorMsg.style.color           = data.message.includes('pending') ? '#e65100' : '#c62828';
          }
          loginBtn.textContent = 'Sign In';
          loginBtn.disabled = false;
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('employee', JSON.stringify(data.employee));
        window.location.href = 'dashboard.html';
      } catch {
        errorMsg.textContent = 'Server error. Please try again.';
        errorMsg.style.display = 'block';
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
